services:
  https-portal:
    image: steveltn/https-portal:1
    depends_on:
      - nginx
    ports:
      - "${STELLA_COMP_HTTP_PORT:-80}:80"
      - "${STELLA_COMP_HTTPS_PORT:-443}:443"
    environment:
      DOMAINS: "${STELLA_COMP_HTTPS_DOMAINS:-localhost -> http://nginx:80}"
      STAGE: "${STELLA_COMP_HTTPS_STAGE:-local}"
      WEBSOCKET: "true"
      CLIENT_MAX_BODY_SIZE: 256M
    volumes:
      - https-portal-data:/var/lib/https-portal

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    expose:
      - "80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/access-control.conf:/etc/nginx/access-control.conf:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_DEPLOY_STAGE: ${STELLA_COMP_DEPLOY_STAGE:-local}
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - worker
      - valkey
    environment:
      GIN_MODE: release
      STELLA_COMP_API_ADDR: :8080
      STELLA_COMP_DATA_DIR: /data
      STELLA_COMP_WORKER_ADDR: worker:50051
      STELLA_COMP_QUEUE_URL: redis://valkey:6379/0
    expose:
      - "8080"
    volumes:
      - stella-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: crates/worker/Dockerfile
    environment:
      STELLA_COMP_WORKER_ADDR: 0.0.0.0:50051
    expose:
      - "50051"
    volumes:
      - stella-data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/50051'"]
      interval: 10s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  https-portal-data:
  stella-data:
  valkey-data:
