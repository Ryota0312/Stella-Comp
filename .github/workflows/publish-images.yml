name: Publish Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install OpenCV and protobuf tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake libclang-dev llvm-dev libopencv-dev pkg-config protobuf-compiler

      - name: Install web dependencies
        working-directory: apps/web
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Typecheck web
        working-directory: apps/web
        run: mise exec -- pnpm typecheck

      - name: Build web
        working-directory: apps/web
        run: mise exec -- pnpm build

      - name: Test API
        working-directory: apps/api
        run: GOCACHE="$PWD/.gocache" GOMODCACHE="$PWD/.gomodcache" mise exec -- go test ./...

      - name: Check Rust workspace
        run: mise exec -- cargo check

  publish-images:
    name: Publish Images
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      web-image: ${{ steps.images.outputs.web }}
      api-image: ${{ steps.images.outputs.api }}
      worker-image: ${{ steps.images.outputs.worker }}
      image-tag: ${{ steps.images.outputs.image_tag }}
      https-stage: ${{ steps.images.outputs.https_stage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names
        id: images
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          base="${{ env.REGISTRY }}/${owner}/${repo}"

          if [ "$REF_TYPE" = "tag" ]; then
            tag="$REF_NAME"
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              https_stage="production"
            elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$ ]]; then
              https_stage="staging"
            else
              echo "::error::Unsupported release tag: ${tag}. Use v1.0.0 for production or v1.0.0-rc.1 for staging."
              exit 1
            fi
            push_latest="false"
          else
            tag="$COMMIT_SHA"
            https_stage=""
            push_latest="true"
          fi

          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "https_stage=${https_stage}" >> "$GITHUB_OUTPUT"
          echo "web=${base}/web:${tag}" >> "$GITHUB_OUTPUT"
          echo "api=${base}/api:${tag}" >> "$GITHUB_OUTPUT"
          echo "worker=${base}/worker:${tag}" >> "$GITHUB_OUTPUT"

          {
            echo "web_tags<<EOF"
            echo "${base}/web:${tag}"
            if [ "$push_latest" = "true" ]; then echo "${base}/web:latest"; fi
            echo "EOF"
            echo "api_tags<<EOF"
            echo "${base}/api:${tag}"
            if [ "$push_latest" = "true" ]; then echo "${base}/api:latest"; fi
            echo "EOF"
            echo "worker_tags<<EOF"
            echo "${base}/worker:${tag}"
            if [ "$push_latest" = "true" ]; then echo "${base}/worker:latest"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.web_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api_tags }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/worker/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.worker_tags }}

  deploy:
    name: Deploy Tagged Release
    needs: publish-images
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.publish-images.outputs.image-tag }}
      https_stage: ${{ needs.publish-images.outputs.https-stage }}
    secrets: inherit
