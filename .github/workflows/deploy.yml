name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy"
        required: true
        default: "latest"

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      STELLA_COMP_HTTPS_DOMAINS: ${{ secrets.STELLA_COMP_HTTPS_DOMAINS }}
      STELLA_COMP_HTTPS_STAGE: ${{ secrets.STELLA_COMP_HTTPS_STAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          base="${{ env.REGISTRY }}/${owner}/${repo}"
          tag="${{ inputs.image_tag }}"
          echo "web=${base}/web:${tag}" >> "$GITHUB_OUTPUT"
          echo "api=${base}/api:${tag}" >> "$GITHUB_OUTPUT"
          echo "worker=${base}/worker:${tag}" >> "$GITHUB_OUTPUT"

      - name: Check deploy secrets
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEPLOY_SSH_KEY STELLA_COMP_HTTPS_DOMAINS; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload deploy files
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/deploy'"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" compose.deploy.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/compose.deploy.yml"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" deploy/nginx.conf "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/deploy/nginx.conf"

      - name: Pull images and restart compose
        run: |
          stage="${STELLA_COMP_HTTPS_STAGE:-production}"
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            printf '%s\n' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin"
          fi
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && \
             STELLA_COMP_WEB_IMAGE='${{ steps.images.outputs.web }}' \
             STELLA_COMP_API_IMAGE='${{ steps.images.outputs.api }}' \
             STELLA_COMP_WORKER_IMAGE='${{ steps.images.outputs.worker }}' \
             STELLA_COMP_HTTPS_DOMAINS='${STELLA_COMP_HTTPS_DOMAINS}' \
             STELLA_COMP_HTTPS_STAGE='${stage}' \
             docker compose -f compose.deploy.yml pull && \
             STELLA_COMP_WEB_IMAGE='${{ steps.images.outputs.web }}' \
             STELLA_COMP_API_IMAGE='${{ steps.images.outputs.api }}' \
             STELLA_COMP_WORKER_IMAGE='${{ steps.images.outputs.worker }}' \
             STELLA_COMP_HTTPS_DOMAINS='${STELLA_COMP_HTTPS_DOMAINS}' \
             STELLA_COMP_HTTPS_STAGE='${stage}' \
             docker compose -f compose.deploy.yml up -d --remove-orphans"
